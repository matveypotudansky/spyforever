<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шпион</title>
    <style>
        :root {
            --bg-color: #09090b; /* Ультра-темный графит/черный */
            --surface-color: #18181b;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --accent-color: #7c3aed; /* Глубокий фиолетовый */
            --accent-hover: #6d28d9;
            --danger-color: #e11d48; /* Для шпиона */
            --border-radius: 16px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.4s ease forwards;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: var(--text-main);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* Управление количеством игроков */
        .players-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 12px 24px;
            width: 100%;
            margin-bottom: 2rem;
            border: 1px solid #27272a;
        }

        .players-control span {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: #27272a;
        }

        /* Список категорий */
        .categories-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: auto;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .category-btn {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid #27272a;
            padding: 18px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .category-btn.selected {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        /* Главная кнопка */
        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 20px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-top: auto;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background-color: var(--accent-hover);
        }

        /* Карточка роли */
        .role-card {
            background-color: var(--surface-color);
            border: 1px solid #27272a;
            border-radius: 24px;
            padding: 40px 20px;
            width: 100%;
            margin-bottom: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        .role-title {
            font-size: 1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .role-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
        }

        .role-value.spy {
            color: var(--danger-color);
            font-size: 2.5rem;
        }

        /* Таймер */
        .timer-display {
            font-size: 4.5rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            margin: 2rem 0;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .timer-controls {
            display: flex;
            gap: 16px;
            width: 100%;
            margin-bottom: auto;
        }

        .btn-secondary {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid #27272a;
            border-radius: var(--border-radius);
            padding: 20px;
            flex: 1;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:active {
            background-color: #27272a;
            transform: scale(0.97);
        }

        .player-indicator {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

    </style>
</head>
<body>

<div id="app">
    <!-- ЭКРАН 1: НАСТРОЙКИ -->
    <div id="screen-setup" class="screen active">
        <h1>Шпион</h1>
        
        <p style="margin-bottom: 8px;">Количество игроков</p>
        <div class="players-control">
            <button class="icon-btn" id="btn-minus">−</button>
            <span id="players-count-display">4</span>
            <button class="icon-btn" id="btn-plus">+</button>
        </div>

        <p style="margin-bottom: 8px;">Выберите категорию</p>
        <div class="categories-list" id="categories-container">
            <!-- Категории генерируются через JS -->
        </div>

        <button class="btn-primary" id="btn-start">Начать игру</button>
    </div>

    <!-- ЭКРАН 2: ОЖИДАНИЕ ИГРОКА -->
    <div id="screen-waiting" class="screen">
        <div class="role-card" style="border: none; background: transparent;">
            <div class="player-indicator" id="waiting-player-num">Игрок 1</div>
            <p>Возьмите устройство в руки и убедитесь, что никто не подглядывает в экран.</p>
        </div>
        <button class="btn-primary" id="btn-show-role">Показать роль</button>
    </div>

    <!-- ЭКРАН 3: ПРОСМОТР РОЛИ -->
    <div id="screen-role" class="screen">
        <div class="role-card">
            <div class="role-title" id="role-subtitle">Секретное слово</div>
            <div class="role-value" id="role-word">...</div>
        </div>
        <p id="role-hint">Запомните это и никому не показывайте.</p>
        <button class="btn-primary" id="btn-hide-role">Понял, скрыть</button>
    </div>

    <!-- ЭКРАН 4: ФИНАЛ (ТАЙМЕР) -->
    <div id="screen-final" class="screen">
        <h2>Шпион среди вас!</h2>
        <p>Начните обсуждение и задавайте друг другу вопросы.</p>
        
        <div class="timer-display" id="timer-display">05:00</div>
        
        <div class="timer-controls">
            <button class="btn-secondary" id="btn-pause-timer">Пауза</button>
            <button class="btn-secondary" id="btn-reset-timer">+1 Мин</button>
        </div>

        <button class="btn-primary" id="btn-restart" style="margin-top: 24px;">Завершить и переиграть</button>
    </div>
</div>

    // === ПАРСИНГ ДАННЫХ ===
    function parseCategoryData(rawData) {
        return rawData
            .split(/[\n;]+/) // Разбиваем по переносам строк и точкам с запятой
            .map(item => item.trim()) // Убираем пробелы по краям
            .map(item => item.replace(/^\d+\.\s*/, '')) // Убираем номера и точки (например "1. ")

    }

        // Отрисовка категорий

            const btn = document.createElement('button');
            btn.className = 'category-btn' + (index === 0 ? ' selected' : '');
            btn.textContent = cat.name;
            btn.onclick = () => selectCategory(index);
            categoriesContainer.appendChild(btn);
        });

        // Слушатели кнопок
        document.getElementById('btn-minus').onclick = () => updatePlayers(-1);
        document.getElementById('btn-plus').onclick = () => updatePlayers(1);
        
        document.getElementById('btn-start').onclick = startGame;
        document.getElementById('btn-show-role').onclick = showRole;
        document.getElementById('btn-hide-role').onclick = hideRoleAndNext;
        
        btnPauseTimer.onclick = toggleTimer;
        document.getElementById('btn-reset-timer').onclick = addMinute;
        document.getElementById('btn-restart').onclick = resetGame;
    }

    function updatePlayers(delta) {
        playersCount += delta;
        if (playersCount < 3) playersCount = 3;
        if (playersCount > 12) playersCount = 12;
        playersCountDisplay.textContent = playersCount;
    }

    function selectCategory(index) {
        selectedCategoryIndex = index;
        document.querySelectorAll('.category-btn').forEach((btn, i) => {
            btn.classList.toggle('selected', i === index);
        });
    }

    function switchScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

        // Парсинг выбранной категории
        const wordsArray = parseCategoryData(rawCategoriesData[selectedCategoryIndex].data);
        
        // Выбор случайного слова
        currentWord = wordsArray[Math.floor(Math.random() * wordsArray.length)];
        
        // Генерация ролей (1 шпион, остальные мирные)
        roles = Array(playersCount).fill('peaceful');
        roles[Math.floor(Math.random() * playersCount)] = 'spy';
        
        currentPlayerIndex = 0;
        prepareWaitingScreen();
    }

    function prepareWaitingScreen() {
        waitingPlayerNum.textContent = `Игрок ${currentPlayerIndex + 1}`;
        switchScreen('waiting');
    }

    function showRole() {
        const isSpy = roles[currentPlayerIndex] === 'spy';
        
        if (isSpy) {
            roleSubtitle.textContent = "Ваша роль";
            roleWord.textContent = "ВЫ ШПИОН";
            roleWord.className = "role-value spy";
            roleHint.textContent = "Попытайтесь не выдать себя и узнать о чём говорят другие.";
        } else {
            roleSubtitle.textContent = "Секретное слово";
            roleWord.textContent = currentWord;
            roleWord.className = "role-value";
            roleHint.textContent = "Задавайте вопросы так, чтобы шпион не догадался о чём речь.";
        }
        
        switchScreen('role');
    }

    function hideRoleAndNext() {
        currentPlayerIndex++;
        if (currentPlayerIndex < playersCount) {
            prepareWaitingScreen();
        } else {
            startDiscussion();
        }
    }

    // === ТАЙМЕР ===
    function startDiscussion() {
        switchScreen('final');
        timeLeft = 300; // 5 минут
        isTimerPaused = false;
        btnPauseTimer.textContent = "Пауза";
        updateTimerDisplay();
        
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(tickTimer, 1000);
    }

    function tickTimer() {
        if (isTimerPaused || timeLeft <= 0) return;
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft === 0) {
            clearInterval(timerInterval);
            timerDisplay.style.color = "var(--danger-color)";
        }
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${m}:${s}`;
    }

    function toggleTimer() {
        if (timeLeft <= 0) return;
        isTimerPaused = !isTimerPaused;
        btnPauseTimer.textContent = isTimerPaused ? "Продолжить" : "Пауза";
    }

    function addMinute() {
        timeLeft += 60;
        timerDisplay.style.color = "var(--text-main)";
        updateTimerDisplay();
    }

    function resetGame() {
        if (timerInterval) clearInterval(timerInterval);
        timerDisplay.style.color = "var(--text-main)";
        switchScreen('setup');
    }

    // Запуск приложения
    init();
</script>

</body>
</html>
